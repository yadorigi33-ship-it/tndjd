<!DOCTYPE html>

    <style>
        /* 全体スタイル */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #111; color: #fff; overflow: hidden; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; transition: font-family 0.3s ease; }
        #game-container { width: 100%; height: 100%; max-width: 480px; max-height: 854px; background: #222; position: relative; overflow: hidden; border: 2px solid #444; }
        
        /* 共通ボタン */
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; background: #ff4757; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px #ff6b81; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #ff6b81; }
        button:disabled { background: #555; box-shadow: none; color: #888; cursor: not-allowed; }

        /* 各種画面の管理 */
        .screen { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; background-size: cover; background-position: center; background-repeat: no-repeat; }
        .screen.active { display: flex; }

        /* 起動ロゴ画面とNEXTボタンの配置を厳密に調整 */
        #logo-screen { background: #000; padding: 0; position: relative; }

        .logo-next-btn {

            padding: 15px 50px;
            font-size: 24px;
            letter-spacing: 2px;
            z-index: 99999; /* 他の要素に絶対に埋もれないように最前面へ */
            box-shadow: 0 4px #ff6b81;
        }

        .title-start-btn { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 2; font-size: 20px; padding: 15px 40px; letter-spacing: 2px; }

        .tutorial-item-desc { font-size: 12.5px; line-height: 1.5; color: #dcdde1; }
